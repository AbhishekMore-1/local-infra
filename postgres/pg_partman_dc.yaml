name: postgres
services:
  app-1:
    container_name: postgres-17-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    build:
      context: .
      dockerfile: pg_partman.Dockerfile
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: always